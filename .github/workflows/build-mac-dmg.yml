name: Build macOS DMG
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DMG
        run: |
          perl -pi -e 's/\r$//' build_mac.sh
          chmod +x build_mac.sh
          bash build_mac.sh
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-mirror-dmg
          path: и°·жӯҢжҠ•еұҸ.dmg
          retention-days: 30
      - name: Publish DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dmg-latest
          name: Google Mirror macOS
          files: и°·жӯҢжҠ•еұҸ.dmg
          overwrite_files: true
